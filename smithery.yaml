runtime: "container"

startCommand:
  type: "http"
  configSchema:
    type: "object"
    required: []
    properties:
      mcpAuthToken:
        type: "string"
        title: "MCP Auth Token"
        description: "Optional authentication token for securing MCP endpoint access"
        format: "password"
  exampleConfig:
    mcpAuthToken: "optional-secret-token"

build:
  dockerfile: "Dockerfile"
  dockerBuildPath: "."

env:
  NODE_ENV: "production"
